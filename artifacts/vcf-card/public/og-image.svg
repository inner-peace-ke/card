  <text x="248" y="212" font-family="'Orbitron', monospace" font-weight="900" font-size="92" fill="#00ff00" letter-spacing="-2">WOLF</text>
  <text x="248" y="308" font-family="'Orbitron', monospace" font-weight="900" font-size="92" fill="#ffffff" fill-opacity="0.55" letter-spacing="-2">VCF</text>

