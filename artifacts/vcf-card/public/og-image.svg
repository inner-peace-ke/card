  <line x1="0" y1="420" x2="1200" y2="420" stroke="#00ff00" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#00ff00" stroke-opacity="0.04" stroke-width="1"/>
