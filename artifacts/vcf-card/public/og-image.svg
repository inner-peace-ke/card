  <text x="600" y="588" font-family="'JetBrains Mono', monospace" font-size="20" fill="#00ff00" fill-opacity="0.3" text-anchor="middle" letter-spacing="4">WOLFVCF.APP — SHARE YOUR LINK. COLLECT CONTACTS. DOWNLOAD VCF.</text>
