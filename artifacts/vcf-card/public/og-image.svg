  <circle cx="148" cy="255" r="64" fill="none" stroke="#00ff00" stroke-opacity="0.5" stroke-width="12"/>
  <path d="M84 348 C84 312 110 290 148 290 C186 290 212 312 212 348" fill="none" stroke="#00ff00" stroke-opacity="0.5" stroke-width="12" stroke-linecap="round"/>

